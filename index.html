  <script>
    (function() {
      // 1. Capturador global de promesas rechazadas para evitar ventanas de error en consola
      window.addEventListener('unhandledrejection', function(event) {
        if (event.reason && (event.reason.toString().includes('Failed to fetch') || event.reason.toString().includes('webpushr'))) {
          console.warn('Escudo: Bloqueada caída de Webpushr en entorno de desarrollo/previsualización:', event.reason);
          event.preventDefault(); // Evita que el navegador detenga la ejecución
        }
      });

      // 2. Comprobar si estamos ejecutando en un iframe, sandbox o URL tipo blob/preview
      var isPreviewEnv = window.location.hostname.includes('usercontent.goog') || 
                         window.location.protocol === 'blob:' || 
                         window.location.href.includes('blob:') ||
                         window.location.hostname === '';

      if (isPreviewEnv) {
        console.log("Escudo Activo: Detectado entorno de pruebas. Webpushr simulado para evitar el error Failed to Fetch.");
        window.webpushr = function() {
          console.log("Simulador Webpushr ejecutó acción:", arguments);
        };
      } else {
        // CÓDIGO DE SEGUIMIENTO WEBPUSHR OPTIMIZADO PARA TU CARPETA /Tienda/
        (function(w,d, s, id) {
          if(typeof(w.webpushr)!=='undefined') return;
          w.webpushr=w.webpushr||function(){(w.webpushr.q=w.webpushr.q||[]).push(arguments)};
          var js, fjs = d.getElementsByTagName(s)[0];
          js = d.createElement(s); js.id = id; js.async=1;
          js.src = "https://cdn.webpushr.com/app.min.js"; 
          fjs.parentNode.appendChild(js);
        }(window,document,'script','webpushr-jssdk-alternative'));

        // =========================================================================================
        // LLAVE REAL CONFIGURADA PARA TU CARPETA /Tienda/ (Evita fallos de Service Worker)
        // =========================================================================================
        webpushr('init','BATOQffJKXkKa6c6fL906YAYsGlukgdJp-ofN7nyQ5x-vrxjDPK4fnsjJ4XNKPEJZ4XDQU40cS_EO715Y3HVZok', {serviceWorkerPath:'/Tienda/webpushr-sw.js'});
      }
    })();
  </script>

  <script>
    // URL DE TU GOOGLE APPS SCRIPT (REEMPLÁZALA CON TU ENLACE /EXEC)
    const API_URL = "https://script.google.com/macros/s/AKfycbwQLLxxNQD3RlNmPOZrnTtUJYUVJ93cc_aC3tx5FDj7D-PF6wLf1SnVawVRTNkE0311Iw/exec";
    let ordersData = [];
    let autocompleteList = []; 
    let activeFilter = 'all';
    let sessionUser = { name: '', role: 'Vendedor' };
    let selectedPhotoBase64 = '';
    let statesInEditMode = {};
    let registerSelectedRole = "Vendedor";
    let lastRenderedHash = ""; 

    window.addEventListener('DOMContentLoaded', () => { checkLocalAuth(); });

    async function callBackend(action, data = {}) {
      try {
        if (action === "getOrders" || action === "getProductAutocompleteList") {
          const res = await fetch(`${API_URL}?action=${action}`);
          return await res.json();
        } else {
          data.action = action;
          const res = await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify(data)
          });
          return await res.json();
        }
      } catch (err) {
        console.error("Fallo comunicación:", err);
        showToast("Error de conexión con la base de datos.", "error");
        document.getElementById('loading-overlay').classList.add('hidden');
        throw err;
      }
    }

    function syncWebpushrAttributes() {
      if (typeof webpushr === 'function' && window.webpushr.name !== 'w' && sessionUser && sessionUser.name) {
        try {
          webpushr('customAttribute', {
            "username": String(sessionUser.name),
            "role": String(sessionUser.role)
          });
          console.log("Sincronizado atributos Webpushr:", sessionUser.name, sessionUser.role);
        } catch(e) {
          console.warn("Fallo registro en Webpushr:", e);
        }
      }
    }

    function requestPushPermission() {
      var isPreviewEnv = window.location.hostname.includes('usercontent.goog') || window.location.protocol === 'blob:' || window.location.hostname === '';
      if (isPreviewEnv) {
        showToast("Simulador: Permisos de alertas concedidos con éxito.", "success");
        return;
      }
      if (typeof webpushr === 'function') {
        try {
          webpushr('showPrompt');
          showToast("Sigue las instrucciones para activar las notificaciones nativas.", "info");
        } catch(e) {
          showToast("No se pudo invocar el módulo de registro.", "error");
        }
      } else {
        showToast("El motor de notificaciones no ha cargado completamente aún.", "error");
      }
    }

    function showToast(m, type) {
      const t = document.getElementById('toast');
      const txt = document.getElementById('toast-text');
      const icon = document.getElementById('toast-icon');
      txt.innerText = m;
      t.className = "fixed top-4 left-1/2 transform -translate-x-1/2 z-50 px-4 py-3 rounded-xl shadow-lg flex items-center gap-2 transition-all duration-300 border " + 
        (type === "success" ? "bg-emerald-100 text-emerald-800 border-emerald-200" : type === "error" ? "bg-red-100 text-red-800 border-red-200" : "bg-blue-100 text-blue-800 border-blue-200");
      icon.innerHTML = type === "success" ? '<i class="fa-solid fa-circle-check"></i>' : type === "error" ? '<i class="fa-solid fa-circle-exclamation"></i>' : '<i class="fa-solid fa-bell"></i>';
      
      t.style.opacity = "1";
      t.style.pointerEvents = "auto";
      
      if (window.toastTimeout) clearTimeout(window.toastTimeout);
      window.toastTimeout = setTimeout(() => {
        t.style.opacity = "0";
        t.style.pointerEvents = "none";
      }, 3000);
    }

    function toggleLoginTabs(mode) {
      const btnL = document.getElementById('tab-btn-login');
      const btnR = document.getElementById('tab-btn-register');
      const boxL = document.getElementById('form-login-box');
      const boxR = document.getElementById('form-register-box');
      if (mode === 'login') {
        btnL.className = "w-1/2 py-2 rounded-lg bg-slate-800 text-teal-400 transition-all";
        btnR.className = "w-1/2 py-2 rounded-lg text-slate-400 transition-all";
        boxL.classList.remove('hidden');
        boxR.classList.add('hidden');
      } else {
        btnR.className = "w-1/2 py-2 rounded-lg bg-slate-800 text-teal-400 transition-all";
        btnL.className = "w-1/2 py-2 rounded-lg text-slate-400 transition-all";
        boxR.classList.remove('hidden');
        boxL.classList.add('hidden');
      }
    }

    function selectRegisterRole(role) {
      registerSelectedRole = role;
      document.getElementById('reg-role-v').className = role === 'Vendedor' ? "py-2 rounded-lg border border-teal-500 bg-teal-900/30 text-teal-400 text-xs font-bold text-center" : "py-2 rounded-lg border border-slate-700 text-slate-400 text-xs font-bold text-center";
      document.getElementById('reg-role-a').className = role === 'Almacenero' ? "py-2 rounded-lg border border-teal-500 bg-teal-900/30 text-teal-400 text-xs font-bold text-center" : "py-2 rounded-lg border border-slate-700 text-slate-400 text-xs font-bold text-center";
    }

    async function submitLogin() {
      const user = document.getElementById('login-username').value.trim();
      const pass = document.getElementById('login-pass').value.trim();
      if (!user || !pass) { showToast("Completa todos los campos", "error"); return; }
      document.getElementById('loading-overlay').classList.remove('hidden');
      try {
        const res = await callBackend("loginUser", { username: user, password: pass });
        document.getElementById('loading-overlay').classList.add('hidden');
        if (res.success) {
          saveSession(res.user);
          showToast(`¡Bienvenido ${res.user.name}!`, "success");
        } else {
          showToast(res.message, "error");
        }
      } catch (e) {
        document.getElementById('loading-overlay').classList.add('hidden');
      }
    }

    async function submitRegister() {
      const user = document.getElementById('reg-username').value.trim();
      const pass = document.getElementById('reg-pass').value.trim();
      if (!user || !pass) { showToast("Completa todos los campos", "error"); return; }
      document.getElementById('loading-overlay').classList.remove('hidden');
      try {
        const res = await callBackend("registerUser", { username: user, password: pass, role: registerSelectedRole });
        document.getElementById('loading-overlay').classList.add('hidden');
        if (res.success) {
          saveSession(res.user);
          showToast("Usuario guardado correctamente", "success");
        } else {
          showToast(res.message, "error");
        }
      } catch (e) {
        document.getElementById('loading-overlay').classList.add('hidden');
      }
    }

    function saveSession(user) {
      sessionUser = user;
      localStorage.setItem('app_session_v4', JSON.stringify(sessionUser));
      document.getElementById('login-overlay').classList.add('hidden');
      document.getElementById('header-user-name').innerText = sessionUser.name;
      document.getElementById('header-user-role').innerText = sessionUser.role;
      syncWebpushrAttributes();
      const defaultTab = sessionUser.role === 'Vendedor' ? 'view-my-orders' : 'view-orders';
      switchTab(defaultTab);
      initApp();
    }

    function checkLocalAuth() {
      const stored = localStorage.getItem('app_session_v4');
      if (stored) {
        sessionUser = JSON.parse(stored);
        document.getElementById('login-overlay').classList.add('hidden');
        document.getElementById('header-user-name').innerText = sessionUser.name;
        document.getElementById('header-user-role').innerText = sessionUser.role;
        syncWebpushrAttributes();
        const defaultTab = sessionUser.role === 'Vendedor' ? 'view-my-orders' : 'view-orders';
        switchTab(defaultTab);
        initApp();
      } else {
        document.getElementById('loading-overlay').classList.add('hidden');
      }
    }

    function logout() {
      localStorage.removeItem('app_session_v4');
      location.reload();
    }

    function initApp() {
      loadData(false);
      loadAutocompleteData();
      startStreaming();
    }

    function startStreaming() {
      setInterval(() => { loadData(true); }, 2500);
    }

    async function loadAutocompleteData() {
      try {
        const list = await callBackend("getProductAutocompleteList");
        autocompleteList = list || [];
      } catch (e) { console.log("Error cargando autocompletado."); }
    }

    async function loadData(silent) {
      if (!silent) document.getElementById('loading-overlay').classList.remove('hidden');
      try {
        const data = await callBackend("getOrders");
        document.getElementById('loading-overlay').classList.add('hidden');
        if (ordersData.length > 0 && data && data.length > 0) {
          checkForNewAlerts(data);
        }
        ordersData = data || [];
        renderOrders();
      } catch (err) {
        document.getElementById('loading-overlay').classList.add('hidden');
      }
    }

    function triggerInAppNotification(title, message, imageUrl) {
      const alertBox = document.getElementById('inapp-notification');
      const textTitle = document.getElementById('inapp-title');
      const textDesc = document.getElementById('inapp-desc');
      const imgContainer = document.getElementById('inapp-image-container');
      const imgTarget = document.getElementById('inapp-image');
      textTitle.innerText = title;
      textDesc.innerText = message;
      if (imageUrl && imageUrl.trim().toLowerCase().startsWith("http")) {
        imgTarget.src = imageUrl;
        imgContainer.classList.remove('hidden');
      } else {
        imgContainer.classList.add('hidden');
      }
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(587.33, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.start();
        setTimeout(() => oscillator.stop(), 180);
      } catch(e) { console.log("No se pudo iniciar el canal de sonido:", e); }
      if ('vibrate' in navigator) { navigator.vibrate([150, 80, 150]); }
      alertBox.classList.add('activa');
      setTimeout(() => { alertBox.classList.remove('activa'); }, 5000);
    }

    function checkForNewAlerts(newData) {
      const currentHash = JSON.stringify(newData.map(o => o.ID_Pedido + '-' + o.Estado));
      if (lastRenderedHash === currentHash) return;
      const oldMap = {};
      ordersData.forEach(o => { oldMap[o.ID_Pedido] = o.Estado; });
      newData.forEach(newOrder => {
        const oldState = oldMap[newOrder.ID_Pedido];
        if (oldState === undefined && ordersData.length > 0) {
          if (sessionUser && sessionUser.role === 'Almacenero') {
            triggerInAppNotification("🚨 ¡NUEVO PEDIDO EN COLA!", `Producto ${newOrder.Producto} solicitado por ${newOrder.Vendedor}.`, newOrder.Foto);
          }
        }
      });
    }

    function switchTab(id) {
      document.getElementById('view-my-orders').classList.add('hidden');
      document.getElementById('view-orders').classList.add('hidden');
      document.getElementById('view-new-order').classList.add('hidden');
      document.getElementById(id).classList.remove('hidden');
    }
  </script>
</body>
</html>
