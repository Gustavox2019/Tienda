<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedidos Almacén - 10 Pisos</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    body { -webkit-tap-highlight-color: transparent; }
    
    .notificacion-emergente {
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      transform: translateY(-150%) translateX(-50%);
    }
    .notificacion-emergente.activa {
      transform: translateY(0) translateX(-50%);
    }
  </style>
</head>
<body class="bg-slate-100 font-sans text-slate-800 min-h-screen pb-20">

  <div id="inapp-notification" class="notificacion-emergente fixed top-4 left-1/2 -translate-x-1/2 w-[92%] max-w-sm bg-slate-900 text-white p-4 rounded-2xl shadow-2xl z-50 border border-slate-700/80 flex flex-col gap-3 pointer-events-none">
    <div class="flex items-center gap-2.5">
      <div class="w-8 h-8 rounded-full bg-teal-500/15 flex items-center justify-center text-teal-400 border border-teal-500/30">
        <i class="fa-solid fa-boxes-stacked text-xs"></i>
      </div>
      <div class="flex-1">
        <p class="text-[10px] uppercase font-bold text-teal-400 tracking-wider">Almacén 10 Pisos • Alerta</p>
        <h4 id="inapp-title" class="font-bold text-sm leading-tight text-white">¡Actualización!</h4>
      </div>
    </div>
    <p id="inapp-desc" class="text-xs text-slate-300 leading-relaxed font-medium"></p>
  </div>

  <div id="login-overlay" class="fixed inset-0 bg-slate-900 z-50 flex flex-col items-center justify-center p-6 text-white transition-all duration-300">
    <div class="w-full max-w-sm bg-slate-800 rounded-2xl p-6 shadow-2xl border border-slate-700 space-y-4">
      <div class="text-center">
        <i class="fa-solid fa-boxes-stacked text-teal-400 text-3xl mb-1"></i>
        <h2 class="text-lg font-bold">Almacén 10 Pisos</h2>
        <div class="flex bg-slate-900 p-1 rounded-xl mt-3 text-xs font-bold">
          <button id="tab-btn-login" onclick="toggleLoginTabs('login')" class="w-1/2 py-2 rounded-lg bg-slate-800 text-teal-400 transition-all">Ingresar</button>
          <button id="tab-btn-register" onclick="toggleLoginTabs('register')" class="w-1/2 py-2 rounded-lg text-slate-400 transition-all">Crear Cuenta</button>
        </div>
      </div>

      <div id="form-login-box" class="space-y-3">
        <input type="text" id="login-username" placeholder="Usuario" class="w-full px-4 py-2.5 bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-teal-500 text-sm">
        <input type="password" id="login-pass" placeholder="Contraseña" class="w-full px-4 py-2.5 bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-teal-500 text-sm">
        <button onclick="submitLogin()" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-2.5 rounded-xl text-sm transition-all shadow-lg">Entrar</button>
      </div>

      <div id="form-register-box" class="space-y-3 hidden">
        <input type="text" id="reg-username" placeholder="Nombre de usuario" class="w-full px-4 py-2.5 bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-teal-500 text-sm">
        <input type="password" id="reg-pass" placeholder="Contraseña" class="w-full px-4 py-2.5 bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-teal-500 text-sm">
        <div>
          <label class="block text-[10px] uppercase font-bold text-slate-400 mb-1 pl-1">Rol:</label>
          <div class="grid grid-cols-2 gap-2">
            <button type="button" onclick="selectRegisterRole('Vendedor')" id="reg-role-v" class="py-2 rounded-lg border border-teal-500 bg-teal-900/30 text-teal-400 text-xs font-bold text-center">Vendedor</button>
            <button type="button" onclick="selectRegisterRole('Almacenero')" id="reg-role-a" class="py-2 rounded-lg border border-slate-700 text-slate-400 text-xs font-bold text-center">Almacenero</button>
          </div>
        </div>
        <button onclick="submitRegister()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 rounded-xl text-sm transition-all shadow-lg">Registrar</button>
      </div>
    </div>
  </div>

  <div id="toast" class="fixed top-4 left-1/2 transform -translate-x-1/2 z-50 px-4 py-3 rounded-xl shadow-lg flex items-center gap-2 transition-all duration-300 opacity-0 pointer-events-none">
    <span id="toast-icon"></span>
    <span id="toast-text" class="font-medium text-sm"></span>
  </div>

  <div id="loading-overlay" class="fixed inset-0 bg-slate-900/80 z-50 flex flex-col items-center justify-center text-white transition-opacity duration-300">
    <div class="animate-spin rounded-full h-12 w-12 border-4 border-teal-500 border-t-transparent"></div>
    <p class="mt-4 font-semibold text-sm">Cargando datos...</p>
  </div>

  <header class="bg-slate-900 text-white sticky top-0 z-40 shadow-md px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-full bg-slate-700 border-2 border-teal-500 flex items-center justify-center text-slate-300">
        <i class="fa-solid fa-user"></i>
      </div>
      <div>
        <h1 class="font-bold text-sm leading-tight" id="header-user-name">Usuario</h1>
        <p class="text-[10px] text-teal-400 uppercase font-semibold tracking-wider" id="header-user-role">Vendedor</p>
      </div>
    </div>
    <button onclick="logout()" class="text-[11px] text-red-400 font-bold bg-slate-800 px-3 py-1.5 rounded-lg">Salir</button>
  </header>

  <main class="max-w-md mx-auto p-4 space-y-4">
    <section id="view-my-orders" class="hidden space-y-4">
      <h2 class="text-base font-bold text-slate-900 flex items-center gap-2"><i class="fa-solid fa-user-tag text-teal-600"></i>Mis Pedidos</h2>
      <div id="my-orders-container" class="space-y-3"></div>
    </section>

    <section id="view-orders" class="space-y-4">
      <div class="flex items-center justify-between">
        <h2 class="text-base font-bold text-slate-900 flex items-center gap-2"><i class="fa-solid fa-list-check text-teal-600"></i>Cola General</h2>
        <div class="flex bg-slate-200 p-1 rounded-lg text-[10px] font-bold">
          <button id="filter-all" onclick="setFilter('all')" class="px-3 py-1 rounded-md bg-white text-slate-800 shadow-sm">Todos</button>
          <button id="filter-pending" onclick="setFilter('pending')" class="px-3 py-1 rounded-md text-slate-600">Por Atender</button>
        </div>
      </div>
      <div id="orders-container" class="space-y-3"></div>
    </section>

    <section id="view-new-order" class="hidden space-y-4">
      <h2 class="text-base font-bold text-slate-900"><i class="fa-solid fa-cart-plus text-teal-600 mr-2"></i>Pedir Producto</h2>
      <form id="order-form" onsubmit="submitOrder(event)" class="bg-white rounded-2xl p-5 shadow-sm border border-slate-200 space-y-4">
        <div class="relative">
          <label class="block text-xs font-bold text-slate-500 mb-1">Producto / Código</label>
          <input type="text" id="order-product" required placeholder="Código..." oninput="filterAutocomplete(this.value)" autocomplete="off" class="w-full px-4 py-2.5 rounded-xl bg-slate-50 border border-slate-200 text-sm">
          <div id="autocomplete-box" class="absolute left-0 right-0 top-full mt-1 bg-white border border-slate-200 rounded-xl shadow-xl max-h-40 overflow-y-auto z-50 hidden no-scrollbar"></div>
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-500 mb-1">Cantidad</label>
          <input type="number" id="order-qty" required min="1" value="1" class="w-full px-4 py-2.5 rounded-xl bg-slate-50 border border-slate-200 text-sm">
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-500 mb-1">Notas</label>
          <textarea id="order-notes" rows="2" class="w-full px-4 py-2.5 rounded-xl bg-slate-50 border border-slate-200 text-sm"></textarea>
        </div>
        <button type="submit" class="w-full bg-teal-600 text-white font-bold py-3 rounded-xl text-sm shadow-md">Enviar Pedido</button>
      </form>
    </section>
  </main>

  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 py-2 px-4 shadow-xl flex justify-around items-center z-40 max-w-md mx-auto rounded-t-2xl">
    <button onclick="switchTab('view-my-orders')" id="tab-my-orders" class="flex flex-col items-center gap-1 text-slate-400">
      <i class="fa-solid fa-user-clock text-lg"></i><span class="text-[9px] font-bold">Mis Pedidos</span>
    </button>
    <button onclick="switchTab('view-orders')" id="tab-orders" class="flex flex-col items-center gap-1 text-slate-400">
      <i class="fa-solid fa-clipboard-list text-lg"></i><span class="text-[9px] font-bold">Cola Gral.</span>
    </button>
    <button onclick="switchTab('view-new-order')" id="tab-new" class="flex flex-col items-center gap-1 text-slate-400">
      <div class="w-9 h-9 rounded-full bg-teal-600 text-white flex items-center justify-center shadow-md -mt-4 border-2 border-white"><i class="fa-solid fa-plus text-xs"></i></div>
      <span class="text-[9px] font-bold">Pedir</span>
    </button>
  </nav>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwQLLxxNQD3RlNmPOZrnTtUJYUVJ93cc_aC3tx5FDj7D-PF6wLf1SnVawVRTNkE0311Iw/exec";
    let ordersData = [];
    let autocompleteList = []; 
    let activeFilter = 'all';
    let sessionUser = { name: '', role: 'Vendedor' };
    let registerSelectedRole = "Vendedor";
    let lastRenderedHash = ""; 

    window.addEventListener('DOMContentLoaded', () => { checkLocalAuth(); });

    async function callBackend(action, data = {}) {
      try {
        if (action === "getOrders" || action === "getProductAutocompleteList") {
          const res = await fetch(`${API_URL}?action=${action}`);
          return await res.json();
        } else {
          data.action = action;
          const res = await fetch(API_URL, { method: "POST", body: JSON.stringify(data) });
          return await res.json();
        }
      } catch (err) {
        showToast("Error de comunicación.", "error");
        document.getElementById('loading-overlay').classList.add('hidden');
        throw err;
      }
    }

    function showToast(m, type) {
      const t = document.getElementById('toast');
      document.getElementById('toast-text').innerText = m;
      t.className = "fixed top-4 left-1/2 transform -translate-x-1/2 z-50 px-4 py-3 rounded-xl shadow-lg flex items-center gap-2 transition-all duration-300 border " + 
        (type === "success" ? "bg-emerald-100 text-emerald-800 border-emerald-200" : type === "error" ? "bg-red-100 text-red-800 border-red-200" : "bg-blue-100 text-blue-800 border-blue-200");
      document.getElementById('toast-icon').innerHTML = type === "success" ? '<i class="fa-solid fa-circle-check"></i>' : '<i class="fa-solid fa-circle-exclamation"></i>';
      t.style.opacity = "1";
      setTimeout(() => { t.style.opacity = "0"; }, 3000);
    }

    function toggleLoginTabs(mode) {
      document.getElementById('form-login-box').classList.toggle('hidden', mode !== 'login');
      document.getElementById('form-register-box').classList.toggle('hidden', mode === 'login');
    }

    function selectRegisterRole(role) {
      registerSelectedRole = role;
      document.getElementById('reg-role-v').className = role === 'Vendedor' ? "py-2 rounded-lg border border-teal-500 bg-teal-900/30 text-teal-400 text-xs font-bold text-center" : "py-2 rounded-lg border border-slate-700 text-slate-400 text-xs font-bold text-center";
      document.getElementById('reg-role-a').className = role === 'Almacenero' ? "py-2 rounded-lg border border-teal-500 bg-teal-900/30 text-teal-400 text-xs font-bold text-center" : "py-2 rounded-lg border border-slate-700 text-slate-400 text-xs font-bold text-center";
    }

    async function submitLogin() {
      const user = document.getElementById('login-username').value.trim();
      const pass = document.getElementById('login-pass').value.trim();
      if (!user || !pass) return;
      document.getElementById('loading-overlay').classList.remove('hidden');
      const res = await callBackend("loginUser", { username: user, password: pass });
      document.getElementById('loading-overlay').classList.add('hidden');
      if (res.success) saveSession(res.user);
      else showToast(res.message, "error");
    }

    async function submitRegister() {
      const user = document.getElementById('reg-username').value.trim();
      const pass = document.getElementById('reg-pass').value.trim();
      if (!user || !pass) return;
      document.getElementById('loading-overlay').classList.remove('hidden');
      const res = await callBackend("registerUser", { username: user, password: pass, role: registerSelectedRole });
      document.getElementById('loading-overlay').classList.add('hidden');
      if (res.success) saveSession(res.user);
      else showToast(res.message, "error");
    }

    function saveSession(user) {
      sessionUser = user;
      localStorage.setItem('app_session_v4', JSON.stringify(sessionUser));
      document.getElementById('login-overlay').classList.add('hidden');
      document.getElementById('header-user-name').innerText = sessionUser.name;
      document.getElementById('header-user-role').innerText = sessionUser.role;
      switchTab(sessionUser.role === 'Vendedor' ? 'view-my-orders' : 'view-orders');
      initApp();
    }

    function checkLocalAuth() {
      const stored = localStorage.getItem('app_session_v4');
      if (stored) saveSession(JSON.parse(stored));
      else document.getElementById('loading-overlay').classList.add('hidden');
    }

    function logout() { localStorage.removeItem('app_session_v4'); location.reload(); }
    function initApp() { loadData(false); loadAutocompleteData(); setInterval(() => loadData(true), 3500); }
    async function loadAutocompleteData() { autocompleteList = await callBackend("getProductAutocompleteList") || []; }

    async function loadData(silent) {
      if (!silent) document.getElementById('loading-overlay').classList.remove('hidden');
      const data = await callBackend("getOrders");
      document.getElementById('loading-overlay').classList.add('hidden');
      if (ordersData.length > 0 && data?.length > 0) checkForNewAlerts(data);
      ordersData = data || [];
      renderOrders();
    }

    function renderOrders() {
      const myCont = document.getElementById('my-orders-container');
      const genCont = document.getElementById('orders-container');
      myCont.innerHTML = ""; genCont.innerHTML = "";
      
      ordersData.forEach(o => {
        const isOwner = (o.Vendedor === sessionUser.name);
        const card = document.createElement('div');
        card.className = "bg-white p-4 rounded-xl border border-slate-200 shadow-sm space-y-2 flex flex-col justify-between";
        
        let actionsHtml = "";
        if (sessionUser.role === "Almacenero" && o.Estado === "Pendiente") {
          actionsHtml = `<div class="flex gap-2 pt-2"><button onclick="updateStatus(${o.rowNum}, 'Tomado')" class="flex-1 bg-amber-500 text-white font-bold text-xs py-1.5 rounded-lg">Tomar Pedido</button></div>`;
        } else if (sessionUser.role === "Almacenero" && o.Estado === "Tomado") {
          actionsHtml = `<div class="flex gap-2 pt-2"><button onclick="updateStatus(${o.rowNum}, 'Disponible')" class="flex-1 bg-teal-600 text-white font-bold text-xs py-1.5 rounded-lg">Disponible</button><button onclick="updateStatus(${o.rowNum}, 'Sin stock')" class="flex-1 bg-red-500 text-white font-bold text-xs py-1.5 rounded-lg">Sin Stock</button></div>`;
        }

        let historyHtml = o.Historial_Cambios ? `<div class="text-[10px] text-slate-400 mt-1 whitespace-pre-line border-t pt-1 border-slate-100">${o.Historial_Cambios}</div>` : "";

        card.innerHTML = `
          <div>
            <div class="flex justify-between font-bold text-xs mb-1">
              <span class="text-slate-900">📦 ${o.Producto} (x${o.Cantidad})</span>
              <span class="px-2 py-0.5 rounded-full text-[10px] ${o.Estado === 'Pendiente' ? 'bg-amber-100 text-amber-800' : o.Estado === 'Tomado' ? 'bg-blue-100 text-blue-800' : 'bg-teal-100 text-teal-800'}">${o.Estado}</span>
            </div>
            <p class="text-xs text-slate-500 font-medium">Pedido por: <b class="text-slate-700">${o.Vendedor}</b></p>
            ${o.Notas ? `<p class="text-xs bg-slate-50 p-2 rounded-lg text-slate-600 mt-1 italic">"${o.Notas}"</p>` : ''}
            ${historyHtml}
          </div>
          ${actionsHtml}
        `;
        
        if (isOwner) myCont.appendChild(card.cloneNode(true));
        if (activeFilter === 'all' || o.Estado === 'Pendiente') genCont.appendChild(card);
      });
    }

    async function updateStatus(rowNum, status) {
      document.getElementById('loading-overlay').classList.remove('hidden');
      const res = await callBackend("updateOrder", { rowNum: rowNum, status: status, workerName: sessionUser.name, isEditingMode: false });
      document.getElementById('loading-overlay').classList.add('hidden');
      if (res.success) { showToast("Estado modificado.", "success"); loadData(true); }
    }

    function triggerInAppNotification(title, message) {
      const alertBox = document.getElementById('inapp-notification');
      document.getElementById('inapp-title').innerText = title;
      document.getElementById('inapp-desc').innerText = message;
      alertBox.classList.add('activa');
      setTimeout(() => { alertBox.classList.remove('activa'); }, 4000);
    }

    function checkForNewAlerts(newData) {
      const currentHash = JSON.stringify(newData.map(o => o.ID_Pedido + '-' + o.Estado));
      if (lastRenderedHash === currentHash) return;
      
      const oldMap = {};
      ordersData.forEach(o => { oldMap[o.ID_Pedido] = o.Estado; });
      
      newData.forEach(newOrder => {
        const oldState = oldMap[newOrder.ID_Pedido];
        if (oldState === undefined && ordersData.length > 0) {
          if (sessionUser?.role === 'Almacenero') {
            triggerInAppNotification("🚨 NUEVO PEDIDO", `${newOrder.Producto} solicitado por ${newOrder.Vendedor}.`);
          }
        } else if (oldState !== undefined && oldState !== newOrder.Estado) {
          if (sessionUser?.role === 'Vendedor' && newOrder.Vendedor === sessionUser.name) {
            triggerInAppNotification("📢 ACTUALIZACIÓN", `Tu pedido de ${newOrder.Producto} cambió a: ${newOrder.Estado}`);
          }
        }
      });
      lastRenderedHash = currentHash;
    }

    function switchTab(id) {
      document.getElementById('view-my-orders').classList.add('hidden');
      document.getElementById('view-orders').classList.add('hidden');
      document.getElementById('view-new-order').classList.add('hidden');
      document.getElementById(id).classList.remove('hidden');
      
      document.getElementById('tab-my-orders').className = id === 'view-my-orders' ? "flex flex-col items-center gap-1 text-teal-600" : "flex flex-col items-center gap-1 text-slate-400";
      document.getElementById('tab-orders').className = id === 'view-orders' ? "flex flex-col items-center gap-1 text-teal-600" : "flex flex-col items-center gap-1 text-slate-400";
      document.getElementById('tab-new').className = id === 'view-new-order' ? "flex flex-col items-center gap-1 text-teal-600" : "flex flex-col items-center gap-1 text-slate-400";
    }

    function setFilter(f) {
      activeFilter = f;
      document.getElementById('filter-all').className = f === 'all' ? "px-3 py-1 rounded-md bg-white text-slate-800 shadow-sm" : "px-3 py-1 rounded-md text-slate-600";
      document.getElementById('filter-pending').className = f === 'pending' ? "px-3 py-1 rounded-md bg-white text-slate-800 shadow-sm" : "px-3 py-1 rounded-md text-slate-600";
      renderOrders();
    }
    async function submitOrder(e) { e.preventDefault(); document.getElementById('loading-overlay').classList.remove('hidden'); await callBackend("addOrder", { product: document.getElementById('order-product').value, qty: document.getElementById('order-qty').value, notes: document.getElementById('order-notes').value, senderName: sessionUser.name }); document.getElementById('order-form').reset(); loadData(false); switchTab('view-my-orders'); }
    function filterAutocomplete(v) { const box = document.getElementById('autocomplete-box'); if (!v) { box.classList.add('hidden'); return; } const matches = autocompleteList.filter(i => i.toLowerCase().includes(v.toLowerCase())); if(matches.length === 0){ box.classList.add('hidden'); return; } box.innerHTML = matches.map(m => `<div onclick="selectMatch('${m}')" class="px-4 py-2 hover:bg-slate-100 text-sm cursor-pointer">${m}</div>`).join(''); box.classList.remove('hidden'); }
    function selectMatch(m) { document.getElementById('order-product').value = m; document.getElementById('autocomplete-box').classList.add('hidden'); }
  </script>
</body>
</html>
